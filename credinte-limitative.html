<style>
  :root {
    --paper: #f1e6d2;
    --paper-soft: #e6d6ba;
    --paper-deep: #d9c69e;
    --surface: #fbf4e3;
    --ink: #2a1d10;
    --ink-soft: #5a4530;
    --ink-mute: #5d4a35;
    --accent: #a05a25;
    --accent-deep: #6e3a14;
    --accent-2: #7a2336;
    --bordo: #7a2336;
    --radius: 6px;
    --radius-lg: 10px;
  }
  * { box-sizing: border-box; }
  :focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; }
  body {
    margin: 0;
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
    background: var(--paper);
    color: var(--ink);
    line-height: 1.55;
    -webkit-font-smoothing: antialiased;
    font-size: 15px;
  }
  .page { max-width: 760px; margin: 0 auto; padding: 40px 28px 60px; }

  .screen {
    background: var(--surface);
    border: 0.5px solid var(--paper-deep);
    border-radius: var(--radius-lg);
    padding: 32px 32px 36px;
    margin-bottom: 8px;
    box-shadow: 0 1px 0 rgba(0,0,0,0.02);
  }

  /* Top header (title + back-link + session-info on Rezumat) */
  .back-row {
    margin-bottom: 8px;
  }
  .back-link {
    font-size: 12px;
    color: var(--ink-mute);
    text-decoration: none;
    text-transform: uppercase;
    letter-spacing: 0.1em;
  }
  .back-link:hover { color: var(--accent); }

  header.top {
    display: flex;
    justify-content: space-between;
    align-items: flex-end;
    gap: 20px;
    margin-bottom: 22px;
    padding-bottom: 14px;
    border-bottom: 0.5px solid var(--bordo);
  }
  h1 {
    margin: 0;
    font-family: 'Fraunces', serif;
    font-weight: 300;
    font-size: 36px;
    letter-spacing: -0.01em;
    color: var(--ink);
  }
  h1 em { font-style: italic; color: var(--accent); font-weight: 400; }
  .subtitle {
    margin: 6px 0 0;
    font-size: 11px;
    color: var(--ink-mute);
    text-transform: uppercase;
    letter-spacing: 0.14em;
  }

  /* Belief echo (shown above Q1–Q4) */
  .belief-echo {
    font-family: 'Fraunces', serif;
    font-style: italic;
    font-size: 20px;
    color: var(--accent-deep);
    text-align: center;
    padding: 16px 12px;
    border-top: 0.5px dashed var(--paper-deep);
    border-bottom: 0.5px dashed var(--paper-deep);
    margin-bottom: 24px;
    line-height: 1.4;
  }

  /* Question prompt (Fraunces, larger) */
  .question {
    font-family: 'Fraunces', serif;
    font-weight: 400;
    font-size: 24px;
    line-height: 1.3;
    color: var(--ink);
    margin: 0 0 18px;
  }
  .question em { color: var(--accent); font-style: italic; }

  .helper {
    font-size: 13px;
    color: var(--ink-mute);
    margin: -8px 0 14px;
    line-height: 1.5;
  }

  /* Textareas */
  textarea {
    width: 100%;
    min-height: 90px;
    font-family: inherit;
    font-size: 15px;
    color: var(--ink);
    background: var(--paper);
    border: 0.5px solid var(--paper-deep);
    border-radius: var(--radius);
    padding: 12px 14px;
    resize: vertical;
    line-height: 1.5;
  }
  textarea:focus {
    outline: none;
    border-color: var(--accent);
    background: var(--surface);
  }
  textarea::placeholder { color: var(--ink-mute); opacity: 0.7; }

  /* Da/Nu choice buttons (for Q1, Q2) */
  .choice-row {
    display: flex;
    gap: 12px;
    margin-bottom: 18px;
  }
  .choice {
    flex: 1;
    font-family: 'Fraunces', serif;
    font-weight: 400;
    font-style: italic;
    font-size: 22px;
    padding: 18px 12px;
    background: var(--paper);
    border: 0.5px solid var(--paper-deep);
    border-radius: var(--radius);
    color: var(--ink-soft);
    cursor: pointer;
    transition: background 0.15s, border-color 0.15s, color 0.15s;
  }
  .choice:hover { border-color: var(--accent); color: var(--ink); }
  .choice.selected {
    background: var(--accent);
    border-color: var(--accent);
    color: var(--paper);
  }

  /* Turnaround helper / explainer */
  .ta-explainer {
    background: var(--paper);
    border-left: 2px solid var(--accent);
    padding: 12px 16px;
    border-radius: 0 var(--radius) var(--radius) 0;
    font-size: 13px;
    color: var(--ink-soft);
    line-height: 1.55;
    margin-bottom: 18px;
  }
  .ta-explainer em { font-style: italic; color: var(--accent-deep); }

  .field-group { margin-bottom: 14px; }
  .field-group label {
    display: block;
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: var(--accent);
    margin-bottom: 6px;
  }

  /* Action row (back + Continuă, or Salvează PDF + Începe din nou) */
  .actions {
    display: flex;
    justify-content: flex-end;
    gap: 10px;
    margin-top: 24px;
    padding-top: 18px;
    border-top: 0.5px solid var(--paper-deep);
  }
  .btn {
    font-family: 'Inter', sans-serif;
    font-size: 13px;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    padding: 12px 22px;
    border-radius: var(--radius);
    border: 0.5px solid var(--accent);
    background: var(--accent);
    color: var(--paper);
    cursor: pointer;
    font-weight: 500;
    transition: background 0.15s;
  }
  .btn:hover { background: var(--accent-deep); }
  .btn:disabled {
    opacity: 0.45;
    cursor: not-allowed;
    background: var(--accent);
  }
  .btn.ghost {
    background: transparent;
    color: var(--accent);
  }
  .btn.ghost:hover { background: var(--paper); color: var(--accent-deep); }

  /* Session-info block (Nume + Data) — used on Rezumat */
  .session-info {
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
  }
  .session-info input {
    padding: 8px 12px;
    font-size: 13px;
    border: 0.5px solid var(--ink-mute);
    border-radius: var(--radius);
    background: var(--surface);
    color: var(--ink);
    min-width: 170px;
    font-family: inherit;
  }
  .session-info input::placeholder { color: var(--ink-mute); }
  .session-info input:focus {
    outline: none;
    border-color: var(--accent);
    background: var(--paper);
  }
  .sr-only {
    position: absolute; width: 1px; height: 1px;
    overflow: hidden; clip: rect(0,0,0,0);
  }

  /* Rezumat blocks + turnaround render — added in Task 8 */

<script>
(function() {
  'use strict';

  function todayLocal() {
    // Returns yyyy-mm-dd in the user's local timezone.
    return new Date().toLocaleDateString('sv-SE');
  }

  // --- Flow definition -------------------------------------------------
  const FLOW = [
    'landing',
    'belief',
    'q1', 'q2', 'q3', 'q4',
    'ta1', 'ta2', 'ta3',
    'summary',
  ];

  function initialState() {
    return {
      screen: 'landing',
      belief: '',
      q1: { answer: null, note: '' },   // answer: 'da' | 'nu' | null
      q2: { answer: null, note: '' },
      q3: '',
      q4: '',
      ta1: { statement: '', examples: ['', '', ''] },
      ta2: { statement: '', examples: ['', '', ''] },
      ta3: { statement: '', examples: ['', '', ''] },
      name: '',
      date: todayLocal(),
    };
  }

  // --- State (in-memory only — no localStorage) ------------------------
  const state = initialState();

  function resetState() {
    Object.assign(state, initialState());
  }

  // --- Navigation ------------------------------------------------------
  function go(screen) {
    state.screen = screen;
    FLOW.forEach(s => {
      const el = document.getElementById('screen-' + s);
      if (el) el.hidden = (s !== screen);
    });
    window.scrollTo({ top: 0, behavior: 'smooth' });
    if (typeof window['render_' + screen] === 'function') {
      window['render_' + screen]();
    }
  }

  function goNext(from) {
    const idx = FLOW.indexOf(from);
    if (idx >= 0 && idx < FLOW.length - 1) go(FLOW[idx + 1]);
  }

  function goBack(from) {
    const idx = FLOW.indexOf(from);
    if (idx > 0) go(FLOW[idx - 1]);
    else go('landing');
  }

  // Expose for inline onclick handlers in screens.
  window.go = go;
  window.goNext = goNext;
  window.goBack = goBack;

  // --- Boot ------------------------------------------------------------
  document.addEventListener('DOMContentLoaded', () => {
    go('landing');
  });

})();
</script>
