<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="base.css">
</head>
<body>
<div class="frame">
  <div class="left">
    <div class="top-block">
      <div class="eyebrow">Ana-Maria Brad · A coaching tool</div>
      <div class="title">Energy<span class="ital">Map</span></div>
      <div class="subtitle">See what charges you and what drains you across your week.</div>
    </div>
    <div class="footer"><span class="dom">anabrad.github.io</span><span class="muted"> · coaching tools</span></div>
  </div>
  <div class="right">
    <div class="card">
      <svg width="340" height="300" viewBox="0 0 340 300">
        <text x="40" y="34" font-family="Inter" font-size="15" fill="#c07a52" text-anchor="start">drains me</text>
        <text x="170" y="34" font-family="Inter" font-size="15" fill="#8a978a" text-anchor="middle">neutral</text>
        <text x="300" y="34" font-family="Inter" font-size="15" fill="#a05a25" text-anchor="end">charges me</text>
        <line x1="170" y1="48" x2="170" y2="246" stroke="#c6d3c2" stroke-width="2"/>
        <!-- charges (green, right) -->
        <rect x="170" y="58"  width="108" height="22" rx="6" fill="#6e9070"/>
        <rect x="170" y="92"  width="78"  height="22" rx="6" fill="#6e9070"/>
        <rect x="170" y="126" width="44"  height="22" rx="6" fill="#6e9070"/>
        <!-- drains (terracotta, left) -->
        <rect x="138" y="160" width="32"  height="22" rx="6" fill="#c07a52"/>
        <rect x="100" y="194" width="70"  height="22" rx="6" fill="#c07a52"/>
        <rect x="86"  y="228" width="84"  height="22" rx="6" fill="#c07a52"/>
        <!-- legend -->
        <rect x="80" y="272" width="14" height="14" rx="4" fill="#6e9070"/>
        <text x="100" y="284" font-family="Inter" font-size="15" fill="#5a4530">Charges me</text>
        <rect x="200" y="272" width="14" height="14" rx="4" fill="#c07a52"/>
        <text x="220" y="284" font-family="Inter" font-size="15" fill="#5a4530">Drains me</text>
      </svg>
    </div>
  </div>
</div>
</body>
</html>
