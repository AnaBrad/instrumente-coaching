<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="base.css">
</head>
<body>
<div class="frame">
  <div class="left">
    <div class="top-block">
      <div class="eyebrow">Ana-Maria Brad · Coach</div>
      <div class="title">Coaching<span class="ital">tools</span></div>
      <div class="subtitle">Visual tools for coaching sessions, 1:1 or with teams.</div>
    </div>
    <div class="footer"><span class="dom">anabrad.github.io</span><span class="muted"> · coaching tools</span></div>
  </div>
  <div class="right">
    <div class="card">
      <div class="grid2">
        <!-- rings (circle of control) -->
        <div class="tile">
          <svg width="120" height="120" viewBox="0 0 120 120">
            <circle cx="60" cy="60" r="48" fill="none" stroke="#cfe0cd" stroke-width="3"/>
            <circle cx="60" cy="60" r="30" fill="none" stroke="#7fa07e" stroke-width="3"/>
            <circle cx="60" cy="60" r="12" fill="#4e7a52"/>
          </svg>
        </div>
        <!-- bars -->
        <div class="tile">
          <svg width="120" height="120" viewBox="0 0 120 120">
            <rect x="34" y="58" width="22" height="42" rx="6" fill="#a8c0a4"/>
            <rect x="64" y="34" width="22" height="66" rx="6" fill="#6e9070"/>
          </svg>
        </div>
        <!-- diverging bars (energy) -->
        <div class="tile">
          <svg width="120" height="120" viewBox="0 0 120 120">
            <line x1="60" y1="24" x2="60" y2="96" stroke="#c6d3c2" stroke-width="2"/>
            <rect x="60" y="34" width="38" height="14" rx="5" fill="#6e9070"/>
            <rect x="60" y="54" width="24" height="14" rx="5" fill="#6e9070"/>
            <rect x="38" y="74" width="22" height="14" rx="5" fill="#c07a52"/>
          </svg>
        </div>
        <!-- funnel (values) -->
        <div class="tile">
          <svg width="120" height="120" viewBox="0 0 120 120">
            <rect x="22" y="32" width="76" height="16" rx="8" fill="#b6cab2"/>
            <rect x="32" y="56" width="56" height="16" rx="8" fill="#8aab88"/>
            <rect x="44" y="80" width="32" height="16" rx="8" fill="#5d8560"/>
          </svg>
        </div>
      </div>
    </div>
  </div>
</div>
</body>
</html>
